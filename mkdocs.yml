site_name: "Multi-Agent RL Training of LLM Workflows"
site_description: Multi-agent RL extensions on top of rllm v0.2.1 for the arxiv paper "When Does Multi-Agent RL Training Improve LLM Workflows?"
docs_dir: docs
theme:
  name: material
  logo: assets/rllm_logo_white.png
  favicon: assets/rllm_logo.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_signature_annotations: true
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source

watch:
  - ./rllm/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.', '..']
      check_paths: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes

nav:
  - Overview: multi-agent/index.md
  - Workflows: multi-agent/workflows.md
  - Policy Sharing (IP vs SP): multi-agent/policy-sharing.md
  - Multi-Agent LoRA: multi-agent/lora-implementation.md
  - Training: multi-agent/training.md
  - Trajectories and Evaluation: multi-agent/trajectories-and-eval.md
  - Monitoring: multi-agent/monitoring.md
  - Running Experiments: multi-agent/running-experiments.md
  - Interventions:
      - I1 — Per-Role KL Anchor: multi-agent/interventions/i1-per-role-kl-anchor.md
      - I6 — Coherence Regularizer: multi-agent/interventions/i6-coherence-regularizer.md
