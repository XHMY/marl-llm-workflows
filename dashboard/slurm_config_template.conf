# dashboard/slurm_config_template.conf
#
# Cluster-specific SLURM directives consumed by dashboard/launch_experiment.sh.
# Copy this file, fill in the placeholders for your cluster, and pass the path
# via `--slurm-config`. The launcher injects --gres=gpu / --cpus-per-gpu /
# --mem-per-gpu from CLI flags and merges the rest of the #SBATCH directives
# below into the generated sbatch script.
#
# The `# META: GPU_TYPE=<H100|L40s|A40|RTX8000>` line below selects the
# per-GPU PPO token budget for each model size (see launch_experiment.sh
# `get_ppo_max_token_len()`). Set it to the GPU model your node provisions.

# META: GPU_TYPE=H100

#SBATCH --partition=<your-partition>
#SBATCH --account=<your-account>
#SBATCH --nodes=1
#SBATCH --time=1-00:00:00
# Uncomment / adapt as needed:
# #SBATCH --constraint=<gpu-feature>
# #SBATCH --nodelist=<specific-node>
# #SBATCH --exclude=<node-to-avoid>
# #SBATCH --requeue
